name: Update stats

# Recount problems after every push, refreshing the stats section of README.md
# and stats.json (consumed by https://beansamuel.github.io/#/competitive).
on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for commit/date stats)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Regenerate stats
        run: python scripts/update_readme_stats.py

      - name: Commit & push if stats changed
        run: |
          if git diff --quiet -- README.md stats.json; then
            echo "Stats unchanged — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md stats.json
          git commit -m "chore: auto-update stats [skip ci]"
          git push
