name: Update README stats

# Recount problems and refresh the stats section of README.md after every push.
on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for commit/date stats)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Regenerate README stats
        run: python scripts/update_readme_stats.py

      - name: Commit & push if README changed
        run: |
          if git diff --quiet -- README.md; then
            echo "README.md unchanged — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: auto-update README stats [skip ci]"
          git push
